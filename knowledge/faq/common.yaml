items:
  - keywords:
      - "能做什么"
      - "做哪些"
      - "范围"
    reply: "目前主要接 Jetson 系列环境配置、模型部署、目标检测运行调试、PyQt 界面联动和远程问题排查这几类服务。"
  - keywords:
      - "远程"
      - "怎么做"
    reply: "可以远程处理，您把当前板卡型号、系统版本、环境现状和目标发我，我先帮您判断怎么安排。"
  - keywords:
      - "需要准备什么"
      - "准备什么"
      - "提供什么"
    reply: "一般需要您准备板卡型号、系统版本、当前报错或目标需求，若涉及模型部署，最好再提供代码、权重和运行方式说明。"
  - keywords:
      - "多久"
      - "周期"
      - "几天"
    reply: "具体周期要看环境复杂度和需求范围，常规远程处理会先评估后安排，简单问题通常可以尽快处理。"
